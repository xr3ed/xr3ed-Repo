name: Auto Sync and Build Extensions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (main branch)
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run sync script
        run: |
          cd src
          python sync_extensions.py

      - name: Check for source changes
        id: source-changes
        run: |
          cd src
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Get list of changed plugins before staging
          changed_plugins=$(git status --porcelain | awk '{print $2}' | cut -d'/' -f1 | grep -v -E "^\." | grep -v -E "^(sync_extensions\.py|phisher_plugins\.txt|build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|gradlew|gradlew\.bat|repo\.json|README\.md)$" | sort -u | tr '\n' ',' | sed 's/,$//')
          
          git add -A
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected in source files."
            
            if [ -n "$changed_plugins" ]; then
              commit_msg="Auto-sync: Update plugins ($changed_plugins)"
            else
              commit_msg="Auto-sync: Update core repository configuration"
            fi
            
            git commit -m "$commit_msg"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "plugins=$changed_plugins" >> $GITHUB_OUTPUT
          else
            echo "No source changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup JDK 21
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21
          cache: 'gradle'

      - name: Setup Android SDK
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: android-actions/setup-android@v3

      - name: Create local.properties with secrets
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        env:
          CRUNCHYROLL_BASIC_TOKEN: ${{ secrets.CRUNCHYROLL_BASIC_TOKEN }}
          CRUNCHYROLL_REFRESH_TOKEN: ${{ secrets.CRUNCHYROLL_REFRESH_TOKEN }}
          ANICHI_API: ${{ secrets.ANICHI_API }}
          ANICHI_SERVER: ${{ secrets.ANICHI_SERVER }}
          ANICHI_ENDPOINT: ${{ secrets.ANICHI_ENDPOINT }}
          ANICHI_APP: ${{ secrets.ANICHI_APP }}
          ZSHOW_API: ${{ secrets.ZSHOW_API }}
          SFMOVIES_API: ${{ secrets.SFMOVIES_API }}
          CINEMATV_API: ${{ secrets.CINEMATV_API }}
          GHOSTX_API: ${{ secrets.GHOSTX_API }}
          SUPERSTREAM_FIRST_API: ${{ secrets.SUPERSTREAM_FIRST_API }}
          SUPERSTREAM_SECOND_API: ${{ secrets.SUPERSTREAM_SECOND_API }}
          SUPERSTREAM_THIRD_API: ${{ secrets.SUPERSTREAM_THIRD_API }}
          SUPERSTREAM_FOURTH_API: ${{ secrets.SUPERSTREAM_FOURTH_API }}
        run: |
          cd src
          touch local.properties
          echo TMDB_API=${{ secrets.TMDB_API }} >> local.properties
          echo DUMP_API=${{ secrets.DUMP_API }} >> local.properties
          echo DUMP_KEY=${{ secrets.DUMP_KEY }} >> local.properties
          echo FanCode_API=${{ secrets.FanCode_API }} >> local.properties
          echo FlixHQAPI=${{ secrets.FlixHQAPI }} >> local.properties
          
          echo CRUNCHYROLL_BASIC_TOKEN=$CRUNCHYROLL_BASIC_TOKEN >> local.properties
          echo CRUNCHYROLL_REFRESH_TOKEN=$CRUNCHYROLL_REFRESH_TOKEN >> local.properties
          
          echo ANICHI_API=$ANICHI_API >> local.properties
          echo ANICHI_SERVER=$ANICHI_SERVER >> local.properties
          echo ANICHI_ENDPOINT=$ANICHI_ENDPOINT >> local.properties
          echo ANICHI_APP=$ANICHI_APP >> local.properties
          
          echo ZSHOW_API=$ZSHOW_API >> local.properties
          echo SFMOVIES_API=$SFMOVIES_API >> local.properties
          echo CINEMATV_API=$CINEMATV_API >> local.properties
          echo GHOSTX_API=$GHOSTX_API >> local.properties
          
          echo SUPERSTREAM_FIRST_API=$SUPERSTREAM_FIRST_API >> local.properties
          echo SUPERSTREAM_SECOND_API=$SUPERSTREAM_SECOND_API >> local.properties
          echo SUPERSTREAM_THIRD_API=$SUPERSTREAM_THIRD_API >> local.properties
          echo SUPERSTREAM_FOURTH_API=$SUPERSTREAM_FOURTH_API >> local.properties

      - name: Build Plugins
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          cd src
          chmod +x gradlew
          
          # Debug: run compilation for Ultima and log it
          ./gradlew :Ultima:make > $GITHUB_WORKSPACE/builds/ultima_build.log 2>&1 || true
          
          # Run custom build python script:
          python build_plugins.py $GITHUB_WORKSPACE/builds
          
      - name: Push builds
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          
          plugins_list="${{ steps.source-changes.outputs.plugins }}"
          if [ -n "$plugins_list" ]; then
            commit_msg="Auto-build: Update plugins ($plugins_list) ($GITHUB_SHA)"
          else
            commit_msg="Auto-build: Update plugins ($GITHUB_SHA)"
          fi
          
          git commit -m "$commit_msg" || true
          git pull --rebase origin builds || true
          git push origin builds
