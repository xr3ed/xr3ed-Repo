name: Auto Sync and Build Extensions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (main branch)
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-type: '3.x'

      - name: Run sync script
        run: |
          cd src
          python sync_extensions.py

      - name: Check for source changes
        id: source-changes
        run: |
          cd src
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Add all files to stage to check status
          git add -A
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected in source files."
            git commit -m "Auto-sync: Update extensions from source repositories"
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No source changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup JDK 21
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Android SDK
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          cd src
          chmod +x gradlew
          
          # Clean builds folder to avoid stale built files
          rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true
          
          # Build all plugins and generate plugins.json
          ./gradlew make makePluginsJson
          
          # Copy all built .cs3 files and plugins.json to builds repository directory
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds/ || true
          cp build/plugins.json $GITHUB_WORKSPACE/builds/
          
      - name: Push builds
        if: steps.source-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git commit -m "Auto-build: Update plugins and plugins.json ($GITHUB_SHA)" || exit 0
          git push
